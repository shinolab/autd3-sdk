[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
confidence-threshold = 0.8

exceptions = [
    { name = "autd3-rs-link-soem", allow = ["GPL-3.0-only"] },
    { name = "autd3-ffi-link-soem", allow = ["GPL-3.0-only"] },
    { name = "autd3-python-link-soem", allow = ["GPL-3.0-only"] },
]

[licenses.private]
ignore = true
