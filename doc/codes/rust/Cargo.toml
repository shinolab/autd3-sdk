[package]
name = "autd3-doc-samples"
version = "0.0.0"
edition = "2024"
rust-version = "1.96"
license = "MIT"
publish = false
autoexamples = false

[workspace]

[dependencies]
autd3-rs = { path = "../../../crates/autd3-rs" }
autd3-rs-pattern = { path = "../../../crates/autd3-rs-pattern" }
autd3-rs-pattern-holo = { path = "../../../crates/autd3-rs-pattern-holo" }
autd3-rs-modulation = { path = "../../../crates/autd3-rs-modulation" }
autd3-rs-firmware-emulator = { path = "../../../crates/autd3-rs-firmware-emulator" }
autd3-rs-link-nop = { path = "../../../crates/autd3-rs-link-nop" }
autd3-rs-link-ethercrab = { path = "../../../crates/autd3-rs-link-ethercrab" }
autd3-rs-link-remote = { path = "../../../crates/autd3-rs-link-remote" }
autd3-rs-link-twincat = { path = "../../../crates/autd3-rs-link-twincat" }
ethercrab = "0.7.1"
anyhow = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time"] }

[lints.rust]
unused = "allow"

