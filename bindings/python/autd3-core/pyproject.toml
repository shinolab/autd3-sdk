[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "autd3-core"
description = "Python bindings for autd3-rs-core (geometry, value types, error)."
requires-python = ">=3.10"
license = "MIT"
dynamic = ["version"]

[tool.maturin]
module-name = "autd3_core"
manifest-path = "Cargo.toml"
