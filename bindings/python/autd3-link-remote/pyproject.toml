[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "autd3-link-remote"
description = "Python bindings for autd3-rs-link-remote (TCP transport link)."
requires-python = ">=3.10"
license = "MIT"
version = "0.1.0"
dependencies = ["autd3-core"]

[tool.maturin]
module-name = "autd3_link_remote"
manifest-path = "Cargo.toml"
include = ["THIRD-PARTY-LICENSES.md", "LICENSE"]
