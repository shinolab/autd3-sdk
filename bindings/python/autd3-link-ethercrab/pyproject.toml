[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "autd3-link-ethercrab"
description = "Python bindings for autd3-rs-link-ethercrab (EtherCAT link via ethercrab)."
requires-python = ">=3.10"
license = "MIT"
dynamic = ["version"]
dependencies = ["autd3-core"]

[tool.maturin]
module-name = "autd3_link_ethercrab"
manifest-path = "Cargo.toml"
include = ["THIRD-PARTY-LICENSES.md", "LICENSE"]
