[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "autd3-pattern-holo"
description = "Python bindings for autd3-rs-pattern-holo (naive, gs, gspat, greedy)."
requires-python = ">=3.10"
license = "MIT"
dynamic = ["version"]
dependencies = ["autd3-core", "autd3-pattern"]

[tool.maturin]
module-name = "autd3_pattern_holo"
manifest-path = "Cargo.toml"
