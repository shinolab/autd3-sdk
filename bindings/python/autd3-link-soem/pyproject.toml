[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "autd3-link-soem"
description = "Python bindings for autd3-rs-link-soem (EtherCAT link via SOEM, GPL-3.0)."
requires-python = ">=3.10"
license = "GPL-3.0-only"
dynamic = ["version"]
dependencies = ["autd3-core"]

[tool.maturin]
module-name = "autd3_link_soem"
manifest-path = "Cargo.toml"
include = ["THIRD-PARTY-LICENSES.md", "LICENSE", "NOTICE"]
