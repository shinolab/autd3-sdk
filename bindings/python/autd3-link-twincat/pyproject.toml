[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "autd3-link-twincat"
description = "Python bindings for autd3-rs-link-twincat (TwinCAT/ADS link)."
requires-python = ">=3.10"
license = "MIT"
dynamic = ["version"]
dependencies = ["autd3-core"]

[tool.maturin]
module-name = "autd3_link_twincat"
manifest-path = "Cargo.toml"
