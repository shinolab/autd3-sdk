version: 2

updates:
  - package-ecosystem: cargo
    directories:
      - "/"
      - "/xtask"
      - "/simulator"
      - "/simulator/frontend"
      - "/console"
      - "/bindings/ffi"
      - "/bindings/python"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      cargo-minor:
        update-types:
          - minor

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    commit-message:
      prefix: chore
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
