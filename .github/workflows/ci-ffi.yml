name: ci-ffi

on:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  ffi:
    name: ffi (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - name: Install system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev cmake
      - name: Format
        if: runner.os == 'Linux'
        run: cargo xtask ffi format
      - run: cargo xtask ffi lint
      - run: cargo xtask ffi build --soem
