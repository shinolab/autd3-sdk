name: release-console

on:
  push:
    tags:
      - 'console-v*'

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  release:
    name: release-console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes

  bundle:
    name: console-bundle (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          workspaces: |
            console
            simulator
            simulator/frontend
            xtask
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall
      - name: Install dioxus-cli
        run: cargo binstall -y dioxus-cli@0.7.9
      - name: Build bundle
        run: cargo xtask console bundle
      - name: Upload bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" console/target/bundle/autd3-console-*.tar.gz
