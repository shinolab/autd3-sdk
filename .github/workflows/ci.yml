name: ci

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      simulator: ${{ steps.filter.outputs.simulator }}
      console: ${{ steps.filter.outputs.console }}
      emulator: ${{ steps.filter.outputs.emulator }}
      cpu: ${{ steps.filter.outputs.cpu }}
      py: ${{ steps.filter.outputs.py }}
      ffi: ${{ steps.filter.outputs.ffi }}
      cs: ${{ steps.filter.outputs.cs }}
      license: ${{ steps.filter.outputs.license }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'
            xtask-core: &xtask-core
              - 'xtask/src/util.rs'
              - 'xtask/Cargo.toml'
              - 'xtask/Cargo.lock'
            rust:
              - *shared
              - 'xtask/**'
              - 'crates/**'
              - 'tools/**'
              - 'examples/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/ci-rust.yml'
            simulator:
              - *shared
              - *xtask-core
              - 'xtask/src/simulator.rs'
              - 'simulator/**'
              - 'crates/autd3-rs-core/**'
              - 'crates/autd3-rs-firmware-emulator/**'
              - 'crates/autd3-rs-link-remote/**'
              - '.cargo/**'
              - '.github/workflows/ci-simulator.yml'
            console:
              - *shared
              - *xtask-core
              - 'xtask/src/console.rs'
              - 'xtask/src/simulator.rs'
              - 'console/**'
              - '.cargo/**'
              - '.github/workflows/ci-console.yml'
            emulator:
              - *shared
              - *xtask-core
              - 'xtask/src/emulator.rs'
              - 'emulator/**'
              - 'crates/autd3-rs/**'
              - 'crates/autd3-rs-core/**'
              - 'crates/autd3-rs-firmware-emulator/**'
              - '.cargo/**'
              - '.github/workflows/ci-emulator.yml'
            cpu:
              - *shared
              - *xtask-core
              - 'xtask/src/cpu.rs'
              - 'firmware/cpu/**'
              - '.github/workflows/ci-cpu.yml'
            py:
              - *shared
              - *xtask-core
              - 'xtask/src/py.rs'
              - 'bindings/python/**'
              - '.github/workflows/ci-py.yml'
            ffi:
              - *shared
              - *xtask-core
              - 'xtask/src/ffi.rs'
              - 'bindings/ffi/**'
              - '.github/workflows/ci-ffi.yml'
            cs:
              - *shared
              - *xtask-core
              - 'xtask/src/cs.rs'
              - 'bindings/csharp/**'
              - 'bindings/ffi/**'
              - '.github/workflows/ci-cs.yml'
            license:
              - *shared
              - *xtask-core
              - 'xtask/src/license.rs'
              - 'deny.toml'
              - 'about.toml'
              - 'about.hbs'
              - 'extra-licenses/**'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'console/Cargo.toml'
              - 'console/Cargo.lock'
              - 'simulator/**/Cargo.toml'
              - 'simulator/Cargo.lock'
              - 'simulator/frontend/Cargo.lock'
              - 'bindings/ffi/**/Cargo.toml'
              - 'bindings/ffi/Cargo.lock'
              - 'bindings/python/**/Cargo.toml'
              - 'bindings/python/Cargo.lock'
              - '.github/workflows/ci-license.yml'

  rust:
    name: rust
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    uses: ./.github/workflows/ci-rust.yml

  simulator:
    name: simulator
    needs: changes
    if: ${{ needs.changes.outputs.simulator == 'true' }}
    uses: ./.github/workflows/ci-simulator.yml

  console:
    name: console
    needs: changes
    if: ${{ needs.changes.outputs.console == 'true' }}
    uses: ./.github/workflows/ci-console.yml

  emulator:
    name: emulator
    needs: changes
    if: ${{ needs.changes.outputs.emulator == 'true' }}
    uses: ./.github/workflows/ci-emulator.yml

  cpu:
    name: cpu
    needs: changes
    if: ${{ needs.changes.outputs.cpu == 'true' }}
    uses: ./.github/workflows/ci-cpu.yml

  py:
    name: py
    needs: changes
    if: ${{ needs.changes.outputs.py == 'true' }}
    uses: ./.github/workflows/ci-py.yml

  ffi:
    name: ffi
    needs: changes
    if: ${{ needs.changes.outputs.ffi == 'true' }}
    uses: ./.github/workflows/ci-ffi.yml

  cs:
    name: cs
    needs: changes
    if: ${{ needs.changes.outputs.cs == 'true' }}
    uses: ./.github/workflows/ci-cs.yml

  license:
    name: license
    needs: changes
    if: ${{ needs.changes.outputs.license == 'true' }}
    uses: ./.github/workflows/ci-license.yml

  guard:
    name: guard-main-source
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        id: chk
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$BASE_REF" != "main" ]; then
            echo "PR does not target main; nothing to enforce."
            echo "lineage=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$HEAD_REF" in
            release/*)
              echo "Source '$HEAD_REF' allowed; will verify develop lineage."
              echo "lineage=check" >> "$GITHUB_OUTPUT" ;;
            hotfix/*)
              echo "Source '$HEAD_REF' allowed (hotfix; no develop lineage required)."
              echo "lineage=skip" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::PRs into main must come from release/* or hotfix/* (got '$HEAD_REF')."
              exit 1 ;;
          esac
      - name: Checkout release head
        if: ${{ steps.chk.outputs.lineage == 'check' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify release is derived from develop
        if: ${{ steps.chk.outputs.lineage == 'check' }}
        run: |
          git fetch --no-tags origin +refs/heads/develop:refs/remotes/origin/develop
          if git merge-base --is-ancestor origin/develop HEAD; then
            echo "release branch contains develop's tip; lineage OK."
          else
            echo "::error::release/* must be cut from develop and contain its tip before merging into main. Merge develop into the release branch."
            exit 1
          fi

  ci-passed:
    name: ci-passed
    if: ${{ always() }}
    needs: [rust, simulator, console, emulator, cpu, py, ffi, cs, license, guard]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no job failed
        run: |
          if [ "${{ needs.rust.result }}" = "failure" ] \
            || [ "${{ needs.simulator.result }}" = "failure" ] \
            || [ "${{ needs.console.result }}" = "failure" ] \
            || [ "${{ needs.emulator.result }}" = "failure" ] \
            || [ "${{ needs.cpu.result }}" = "failure" ] \
            || [ "${{ needs.py.result }}" = "failure" ] \
            || [ "${{ needs.ffi.result }}" = "failure" ] \
            || [ "${{ needs.cs.result }}" = "failure" ] \
            || [ "${{ needs.license.result }}" = "failure" ] \
            || [ "${{ needs.guard.result }}" != "success" ]; then
            echo "A required job failed."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
