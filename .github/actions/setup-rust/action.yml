name: setup-rust
description: Install the Rust toolchain and set up build caching for autd3-sdk.

inputs:
  components:
    description: Comma-separated list of rustup components to install (e.g. "rustfmt, clippy").
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          xtask
